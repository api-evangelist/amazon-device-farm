apis:
  - name: AWS Device Farm API
    description: >-
      The AWS Device Farm API enables programmatic access to create and manage
      test runs, device pools, projects, and jobs for testing mobile and web
      applications across real devices and browsers. Supports 77 operations
      covering projects, runs, devices, uploads, remote access sessions, Selenium
      test grid, network profiles, instance profiles, VPC endpoint configurations,
      and resource tagging.
