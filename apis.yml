name: Amazon Device Farm
description: >-
  AWS Device Farm is an application testing service that lets you improve the
  quality of your web and mobile apps by testing them across an extensive range
  of desktop browsers and real mobile devices without having to provision and
  manage any testing infrastructure.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
