naftiko: "1.0.0-alpha1"

info:
  label: AWS Device Farm API
  description: AWS Device Farm API for testing web and mobile applications across real devices and desktop browsers.
  tags:
    - Amazon Device Farm
    - Mobile Testing
    - Device Testing
    - Application Testing
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: device-farm
      baseUri: https://devicefarm.us-west-2.amazonaws.com
      description: AWS Device Farm REST API for mobile and browser testing.
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: projects
          path: /
          description: Project management
          operations:
            - name: create-project
              method: POST
              description: Creates a Device Farm project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-projects
              method: POST
              description: Lists projects
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-project
              method: POST
              description: Gets project information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: runs
          path: /
          description: Test run management
          operations:
            - name: schedule-run
              method: POST
              description: Schedules a test run
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-run
              method: POST
              description: Gets test run information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-runs
              method: POST
              description: Lists test runs
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: stop-run
              method: POST
              description: Stops a running test
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device-pools
          path: /
          description: Device pool management
          operations:
            - name: create-device-pool
              method: POST
              description: Creates a device pool with specified rules
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-device-pools
              method: POST
              description: Lists device pools
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-device-pool
              method: POST
              description: Gets device pool information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: devices
          path: /
          description: Device catalog
          operations:
            - name: list-devices
              method: POST
              description: Lists available devices
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-device
              method: POST
              description: Gets information about a device type
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: uploads
          path: /
          description: Upload management for apps and test scripts
          operations:
            - name: create-upload
              method: POST
              description: Creates an upload for an app or test scripts
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-uploads
              method: POST
              description: Lists uploads
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-upload
              method: POST
              description: Gets upload information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: remote-access-sessions
          path: /
          description: Remote access session management
          operations:
            - name: create-remote-access-session
              method: POST
              description: Starts a remote access session on a device
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-remote-access-sessions
              method: POST
              description: Lists remote access sessions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: stop-remote-access-session
              method: POST
              description: Stops a remote access session
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: test-grid-projects
          path: /
          description: Selenium test grid project management
          operations:
            - name: create-test-grid-project
              method: POST
              description: Creates a Selenium testing project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-test-grid-projects
              method: GET
              description: Lists Selenium test grid projects
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-test-grid-url
              method: POST
              description: Creates a signed URL for Selenium RemoteWebDriver
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: jobs
          path: /
          description: Job management
          operations:
            - name: list-jobs
              method: POST
              description: Lists jobs in a test run
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-job
              method: POST
              description: Gets job information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: device-farm-rest
      resources:
        - path: /v1/projects
          name: projects
          description: Device Farm projects
          operations:
            - method: GET
              name: list-projects
              description: List all test projects
              call: "device-farm.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-project
              description: Create a new test project
              call: "device-farm.create-project"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/runs
          name: runs
          description: Test runs
          operations:
            - method: GET
              name: list-runs
              description: List test runs
              call: "device-farm.list-runs"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: schedule-run
              description: Schedule a new test run
              call: "device-farm.schedule-run"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/devices
          name: devices
          description: Available devices
          operations:
            - method: GET
              name: list-devices
              description: List available devices for testing
              call: "device-farm.list-devices"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: device-farm-mcp
      transport: http
      tools:
        - name: list-projects
          description: List AWS Device Farm test projects
          hints:
            readOnly: true
            openWorld: true
          call: "device-farm.list-projects"
          outputParameters:
            - type: object
              mapping: "$."

        - name: schedule-run
          description: Schedule a new device test run
          hints:
            readOnly: false
            destructive: false
          call: "device-farm.schedule-run"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-run
          description: Get test run results and status
          hints:
            readOnly: true
            openWorld: false
          call: "device-farm.get-run"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-devices
          description: List available real devices for testing
          hints:
            readOnly: true
            openWorld: true
          call: "device-farm.list-devices"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-device-pools
          description: List device pools configured for testing
          hints:
            readOnly: true
            openWorld: true
          call: "device-farm.list-device-pools"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-upload
          description: Upload an app or test script for testing
          hints:
            readOnly: false
            destructive: false
          call: "device-farm.create-upload"
          outputParameters:
            - type: object
              mapping: "$."
