      - OS_VERSION
      - MODEL
      - AVAILABILITY
    RuleOperator:
      type: string
      enum:
      - EQUALS
      - LESS_THAN
      - LESS_THAN_OR_EQUALS
      - GREATER_THAN
      - GREATER_THAN_OR_EQUALS
      - IN
      - NOT_IN
      - CONTAINS
    ArgumentException: {}
