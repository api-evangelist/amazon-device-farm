        created:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          - description: The time that the session was started.
        ended:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          - description: The time the session ended.
        billingMinutes:
          allOf:
          - $ref: '#/components/schemas/Double'
